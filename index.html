<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenninChat - メイン</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f0f4f9;
            --bg-hover: #e1e5ea;
            --bg-active: #d3e3fd;
            --text-main: #1f1f1f;
            --text-sub: #5e5e5e;
            --brand-color: #0b57d0;
            --border-color: #c7c7c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 256px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 8px;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            padding: 12px 8px;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-main);
            gap: 8px;
        }

        .user-info-box {
            background-color: #ffffff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            font-size: 0.8rem;
        }
        
        .user-id-display {
            color: var(--brand-color);
            cursor: pointer;
            text-decoration: underline;
            word-break: break-all;
            margin-top: 4px;
            display: block;
        }

        .friend-add-box {
            display: none;
            gap: 4px;
            margin-bottom: 8px;
        }

        .friend-add-box input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            outline: none;
        }

        .friend-add-box button {
            background-color: var(--brand-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .menu-section {
            margin-bottom: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .chat-list {
            list-style: none;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #444746;
            margin-bottom: 2px;
        }

        .chat-item:hover {
            background-color: var(--bg-hover);
        }

        .chat-item.active {
            background-color: var(--bg-active);
            color: #041e49;
            font-weight: 600;
        }

        .avatar {
            width: 24px;
            height: 24px;
            background-color: #a8c7fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #041e49;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        .main-header {
            height: 64px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #1f8737;
            border-radius: 50%;
        }

        .message-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #f8f9fa;
        }

        .message-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 85%;
            position: relative;
            transition: transform 0.2s ease;
            user-select: none;
        }

        .message-group.received {
            align-self: flex-start;
        }

        .message-group.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            background-color: #74c0fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: auto;
            max-width: calc(100% - 48px);
        }

        .message-group.sent .msg-body {
            align-items: flex-end;
        }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .message-group.sent .msg-header {
            flex-direction: row-reverse;
        }

        .msg-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
        }

        .msg-time {
            font-size: 0.7rem;
            color: var(--text-sub);
        }

        .msg-text {
            font-size: 0.95rem;
            line-height: 1.45;
            padding: 10px 14px;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-break: break-all;
            white-space: pre-wrap;
            position: relative;
        }

        .message-group.received .msg-text {
            background-color: #ffffff;
            color: #1f1f1f;
            border-top-left-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        .message-group.sent .msg-text {
            background-color: var(--brand-color);
            color: #ffffff;
            border-top-right-radius: 4px;
        }

        .msg-reply-preview {
            background-color: rgba(0, 0, 0, 0.05);
            border-left: 3px solid var(--brand-color);
            padding: 4px 8px;
            font-size: 0.8rem;
            border-radius: 4px;
            margin-bottom: 4px;
            color: var(--text-sub);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .message-group.sent .msg-reply-preview {
            border-left: none;
            border-right: 3px solid #ffffff;
        }

        .msg-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            align-items: center;
        }

        .reaction-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #f1f3f4;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .reaction-badge:hover {
            border-color: var(--border-color);
            background-color: #e8eaed;
        }

        .btn-msg-del {
            background: none;
            border: none;
            color: #d93025;
            cursor: pointer;
            font-size: 16px;
            padding: 2px;
            border-radius: 50%;
            display: none;
        }

        .message-group:hover .btn-msg-del {
            display: inline-block;
        }

        .btn-msg-del:hover {
            background-color: rgba(217, 48, 37, 0.08);
        }

        .input-container {
            padding: 0 24px 24px 24px;
            background-color: #f8f9fa;
        }

        .reply-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            background-color: #e8eaed;
            padding: 6px 16px;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .reply-banner span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 80%;
        }

        .reply-banner i {
            cursor: pointer;
            font-size: 16px;
            color: var(--text-sub);
        }

        .input-box {
            border: 1px solid var(--border-color);
            border-radius: 28px;
            background-color: #fff;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .input-box.has-reply {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        .input-box:focus-within {
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            border-color: transparent;
        }

        .input-box textarea {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 0.95rem;
            padding: 8px 4px;
            min-height: 40px;
            max-height: 200px;
        }

        .input-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid #f1f3f4;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
            color: var(--text-sub);
        }

        .toolbar-left i {
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            font-size: 20px;
            transition: background-color 0.2s, color 0.2s;
        }

        .toolbar-left i:hover {
            background-color: #f1f3f4;
            color: var(--text-main);
        }

        .btn-send {
            background: none;
            border: none;
            color: var(--brand-color);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-send:hover {
            background-color: rgba(11, 87, 208, 0.08);
        }

        .btn-send:disabled {
            color: var(--border-color);
            cursor: default;
            background: none;
        }

        .toast {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #323232;
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }

        .group-manage-box {
            display: none;
            background-color: #ffffff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            font-size: 0.8rem;
            flex-direction: column;
            gap: 6px;
        }

        .group-manage-box input {
            padding: 6px 10px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            outline: none;
        }

        .group-manage-box button {
            background-color: #1f8737;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-right select {
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            outline: none;
        }

        .header-right button {
            background-color: var(--brand-color);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* 規定のスタイルに干渉しないように追加するモーダル表示用CSS */
        .btn-plus-trigger {
            cursor: pointer;
            color: var(--text-sub);
            padding: 4px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .btn-plus-trigger:hover {
            background-color: var(--bg-hover);
            color: var(--text-main);
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-card {
            background: #ffffff;
            width: 90%;
            max-width: 360px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-header-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .modal-options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .modal-opt-btn {
            width: 100%;
            padding: 12px;
            text-align: left;
            background: var(--bg-sidebar);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }
        .modal-opt-btn:hover {
            background: var(--bg-hover);
        }
        .modal-input-field {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }
        .modal-input-field:focus {
            border-color: var(--brand-color);
        }
        .modal-footer-btns {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-modal-action {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-modal-action.cancel {
            background: transparent;
            color: var(--text-sub);
        }
        .btn-modal-action.primary {
            background: var(--brand-color);
            color: white;
        }
        .modal-member-checklist {
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .modal-member-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .modal-member-item input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">アクションが実行されました</div>

    <div class="modal-overlay" id="actionModal">
        <div class="modal-card" id="step1Choice">
            <div class="modal-header-title">新規作成</div>
            <div class="modal-options-list">
                <button class="modal-opt-btn" onclick="openFriendAddStep()">
                    <i class="material-icons-outlined" style="color: var(--brand-color)">person_add</i>
                    <span>フレンドを追加する</span>
                </button>
                <button class="modal-opt-btn" onclick="openGroupInviteStep()">
                    <i class="material-icons-outlined" style="color: #1f8737">group_add</i>
                    <span>グループを作成する</span>
                </button>
            </div>
            <div class="modal-footer-btns">
                <button class="btn-modal-action cancel" onclick="closeActionModal()">キャンセル</button>
            </div>
        </div>

        <div class="modal-card" id="stepFriendAdd" style="display: none;">
            <div class="modal-header-title">フレンド追加</div>
            <input type="text" id="modalFriendIdInput" class="modal-input-field" placeholder="友達の固有IDを入力">
            <div class="modal-footer-btns">
                <button class="btn-modal-action cancel" onclick="backToStep1()">戻る</button>
                <button class="btn-modal-action primary" onclick="submitModalFriendAdd()">追加</button>
            </div>
        </div>

        <div class="modal-card" id="stepGroupInvite" style="display: none;">
            <div class="modal-header-title">グループ作成 (1/2): メンバー招待</div>
            <div style="font-size: 0.8rem; color: var(--text-sub);">招待する人を選択してください（複数可）</div>
            <div class="modal-member-checklist" id="modalInviteChecklist"></div>
            <div class="modal-footer-btns">
                <button class="btn-modal-action cancel" onclick="backToStep1()">戻る</button>
                <button class="btn-modal-action primary" onclick="goToGroupNameStep()">次へ</button>
            </div>
        </div>

        <div class="modal-card" id="stepGroupName" style="display: none;">
            <div class="modal-header-title">グループ作成 (2/2): グループ名設定</div>
            <input type="text" id="modalGroupNameInput" class="modal-input-field" placeholder="グループ名を入力">
            <div class="modal-footer-btns">
                <button class="btn-modal-action cancel" onclick="backToGroupInviteStep()">戻る</button>
                <button class="btn-modal-action primary" onclick="submitModalGroupCreate()">作成</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area">
            <i class="material-icons-outlined" style="color:#0b57d0">chat</i>
            <span>SenninChat</span>
        </div>

        <div class="user-info-box">
            <div>ログインユーザー: <strong id="myUsername">...</strong></div>
            <div>あなたの固有ID (クリックでコピー):</div>
            <span class="user-id-display" id="myUserId" onclick="copyMyId()">...</span>
        </div>

        <div class="friend-add-box">
            <input type="text" id="friendIdInput" placeholder="友達の固有IDを入力">
            <button onclick="addFriend()">追加</button>
        </div>

        <div class="group-manage-box">
            <div>グループ作成:</div>
            <input type="text" id="groupNameInput" placeholder="グループ名を入力">
            <button onclick="createGroup()">作成</button>
        </div>

        <div class="menu-section">
            <div class="section-title">
                <span>直近のチャット・フレンド</span>
                <i class="material-icons-outlined btn-plus-trigger" onclick="openActionModal()">add</i>
            </div>
            <ul class="chat-list" id="chatList">
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="main-header">
            <div class="header-left">
                <span class="header-title" id="currentChatName">チャットを選択してください</span>
                <div class="status-dot" id="statusDot" style="display:none;"></div>
            </div>
            <div class="header-right" id="groupInviteArea" style="display: none;">
                <select id="inviteFriendSelect"></select>
                <button onclick="inviteToGroup()">招待</button>
            </div>
        </div>

        <div class="message-area" id="messageArea">
            <div style="text-align:center; padding-top:40px; color:var(--text-sub);">
                左側のリストからフレンドを選択してチャットを開始してください。
            </div>
        </div>

        <div class="input-container">
            <div class="reply-banner" id="replyBanner">
                <span id="replyBannerText"></span>
                <i class="material-icons-outlined" onclick="cancelReply()">close</i>
            </div>
            <form id="chatForm">
                <div class="input-box" id="inputBox">
                    <textarea id="chatInput" placeholder="メッセージを入力" rows="1" disabled></textarea>
                    <div class="input-toolbar">
                        <div class="toolbar-left">
                            <i class="material-icons-outlined" id="toolEmoji" title="絵文字を追加">sentiment_satisfied</i>
                        </div>
                        <button type="submit" class="btn-send" id="sendBtn" disabled>
                            <i class="material-icons-outlined">send</i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const sessionUser = sessionStorage.getItem('chat_user');
        if (!sessionUser) {
            window.location.href = '/account.html';
        }
        const currentUser = JSON.parse(sessionUser);

        document.getElementById('myUsername').textContent = currentUser.username;
        document.getElementById('myUserId').textContent = currentUser.userId;

        const socket = io();
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatForm = document.getElementById('chatForm');
        const messageArea = document.getElementById('messageArea');
        const chatList = document.getElementById('chatList');
        const toast = document.getElementById('toast');
        const statusDot = document.getElementById('statusDot');
        const groupInviteArea = document.getElementById('groupInviteArea');
        const inviteFriendSelect = document.getElementById('inviteFriendSelect');
        const replyBanner = document.getElementById('replyBanner');
        const replyBannerText = document.getElementById('replyBannerText');
        const inputBox = document.getElementById('inputBox');

        let currentChannelName = '';
        let currentChannelColor = '#74c0fc';
        let currentFriendId = '';
        let currentRoomId = '';
        let isGroupMode = false;
        let selectedReplyId = null;
        let selectedReplyText = '';
        
        let globalFriendsCache = [];

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function copyMyId() {
            navigator.clipboard.writeText(currentUser.userId);
            showToast("固有IDをクリップボードにコピーしました");
        }

        // モーダル表示制御ロジック
        function openActionModal() {
            document.getElementById('actionModal').style.display = 'flex';
            backToStep1();
        }
        function closeActionModal() {
            document.getElementById('actionModal').style.display = 'none';
        }
        function backToStep1() {
            document.getElementById('step1Choice').style.display = 'flex';
            document.getElementById('stepFriendAdd').style.display = 'none';
            document.getElementById('stepGroupInvite').style.display = 'none';
            document.getElementById('stepGroupName').style.display = 'none';
        }
        function openFriendAddStep() {
            document.getElementById('step1Choice').style.display = 'none';
            document.getElementById('stepFriendAdd').style.display = 'flex';
            document.getElementById('modalFriendIdInput').value = '';
            document.getElementById('modalFriendIdInput').focus();
        }
        function openGroupInviteStep() {
            document.getElementById('step1Choice').style.display = 'none';
            document.getElementById('stepGroupInvite').style.display = 'flex';
            
            const checklist = document.getElementById('modalInviteChecklist');
            checklist.innerHTML = '';
            if (globalFriendsCache.length === 0) {
                checklist.innerHTML = '<div style="font-size:0.8rem; padding:8px; color:var(--text-sub);">選択できるフレンドがいません</div>';
            } else {
                globalFriendsCache.forEach(f => {
                    const label = document.createElement('label');
                    label.classList.add('modal-member-item');
                    label.innerHTML = `
                        <input type="checkbox" name="modalGroupInviteUser" value="${f.user_id}">
                        <span>${escapeHTML(f.username)}</span>
                    `;
                    checklist.appendChild(label);
                });
            }
        }
        function goToGroupNameStep() {
            document.getElementById('stepGroupInvite').style.display = 'none';
            document.getElementById('stepGroupName').style.display = 'flex';
            document.getElementById('modalGroupNameInput').value = '';
            document.getElementById('modalGroupNameInput').focus();
        }
        function backToGroupInviteStep() {
            document.getElementById('stepGroupName').style.display = 'none';
            document.getElementById('stepGroupInvite').style.display = 'flex';
        }
        async function submitModalFriendAdd() {
            const val = document.getElementById('modalFriendIdInput').value.trim();
            if(!val) return;
            document.getElementById('friendIdInput').value = val;
            await addFriend();
            closeActionModal();
        }
        async function submitModalGroupCreate() {
            const gName = document.getElementById('modalGroupNameInput').value.trim();
            if(!gName) {
                showToast("グループ名を入力してください");
                return;
            }
            
            const checkboxes = document.getElementsByName('modalGroupInviteUser');
            const inviteUserIds = [];
            checkboxes.forEach(cb => {
                if(cb.checked) inviteUserIds.push(cb.value);
            });
            
            try {
                const res = await fetch('/api/groups/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        groupName: gName, 
                        userId: currentUser.userId,
                        inviteUserIds: inviteUserIds
                    })
                });
                const data = await res.json();
                showToast(data.message);
                if (data.success) {
                    closeActionModal();
                    loadFriends();
                }
            } catch (err) {
                showToast("通信エラーが発生しました");
            }
        }

        async function loadFriends() {
            try {
                const res = await fetch(`/api/friends?userId=${currentUser.userId}`);
                const data = await res.json();
                if (data.success) {
                    globalFriendsCache = data.friends;
                    inviteFriendSelect.innerHTML = '';
                    data.friends.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f.user_id;
                        opt.textContent = f.username;
                        inviteFriendSelect.appendChild(opt);
                    });
                    await loadChannels(data.friends);
                }
            } catch (err) {
                console.error("フレンドリスト取得失敗", err);
            }
        }

        async function loadChannels(friendsList) {
            try {
                const res = await fetch(`/api/groups?userId=${currentUser.userId}`);
                const data = await res.json();
                
                chatList.innerHTML = '';
                
                if (friendsList.length === 0 && (!data.success || data.groups.length === 0)) {
                    chatList.innerHTML = '<li style="font-size:0.8rem; padding:8px; color:var(--text-sub);">アイテムがありません</li>';
                    return;
                }

                friendsList.forEach((f, idx) => {
                    const initial = f.username.charAt(0).toUpperCase();
                    const colors = ['#74c0fc', '#e2c5ff', '#fcdebc', '#b2f2bb', '#ffc9c9'];
                    const color = colors[idx % colors.length];

                    const li = document.createElement('li');
                    li.classList.add('chat-item');
                    if (!isGroupMode && currentFriendId === f.user_id) li.classList.add('active');
                    li.onclick = function() { switchChannel(this, f.username, initial, color, f.user_id, false); };
                    li.innerHTML = `
                        <div class="avatar" style="background-color: ${color};">${initial}</div>
                        <span>${f.username}</span>
                    `;
                    chatList.appendChild(li);
                });

                if (data.success) {
                    data.groups.forEach((g, idx) => {
                        const initial = g.group_name.charAt(0).toUpperCase();
                        const color = '#ffc9c9';

                        const li = document.createElement('li');
                        li.classList.add('chat-item');
                        if (isGroupMode && currentRoomId === g.group_id) li.classList.add('active');
                        li.onclick = function() { switchChannel(this, g.group_name, initial, color, g.group_id, true); };
                        li.innerHTML = `
                            <div class="avatar" style="background-color: ${color};">${initial}</div>
                            <span>${g.group_name} (G)</span>
                        `;
                        chatList.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("チャンネル読み込み失敗", err);
            }
        }

        async function addFriend() {
            const friendIdInput = document.getElementById('friendIdInput');
            const friendId = friendIdInput.value.trim();
            if(!friendId) return;

            try {
                const res = await fetch('/api/friends/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.userId, friendId: friendId })
                });
                const data = await res.json();
                showToast(data.message);
                if(data.success) {
                    friendIdInput.value = '';
                    loadFriends();
                }
            } catch(err) {
                showToast("通信エラーが発生しました");
            }
        }

        async function createGroup() {
            const groupNameInput = document.getElementById('groupNameInput');
            const groupName = groupNameInput.value.trim();
            if (!groupName) return;

            try {
                const res = await fetch('/api/groups/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groupName: groupName, userId: currentUser.userId })
                });
                const data = await res.json();
                showToast(data.message);
                if (data.success) {
                    groupNameInput.value = '';
                    loadFriends();
                }
            } catch (err) {
                showToast("通信エラーが発生しました");
            }
        }

        async function inviteToGroup() {
            if (!isGroupMode || !currentRoomId) return;
            const friendId = inviteFriendSelect.value;
            if (!friendId) {
                showToast("フレンドを選択してください");
                return;
            }

            try {
                const res = await fetch('/api/groups/invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groupId: currentRoomId, friendId: friendId })
                });
                const data = await res.json();
                showToast(data.message);
            } catch (err) {
                showToast("通信エラーが発生しました");
            }
        }

        chatInput.addEventListener('input', () => {
            sendBtn.disabled = chatInput.value.trim() === '';
            chatInput.style.height = 'auto';
            chatInput.style.height = chatInput.scrollHeight + 'px';
        });

        function setupSwipeToReply(element, msgId, text) {
            let startX = 0;
            let currentX = 0;
            let isSwiping = false;

            element.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isSwiping = true;
            }, { passive: true });

            element.addEventListener('touchmove', (e) => {
                if (!isSwiping) return;
                currentX = e.touches[0].clientX;
                let diffX = currentX - startX;
                if (diffX > 0) {
                    if (diffX > 80) diffX = 80;
                    element.style.transform = `translateX(${diffX}px)`;
                }
            }, { passive: true });

            element.addEventListener('touchend', () => {
                if (!isSwiping) return;
                isSwiping = false;
                let diffX = currentX - startX;
                element.style.transform = 'translateX(0px)';
                if (diffX > 50) {
                    initiateReply(msgId, text);
                }
                startX = 0;
                currentX = 0;
            });

            element.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                isSwiping = true;
                
                const onMouseMove = (ev) => {
                    if (!isSwiping) return;
                    currentX = ev.clientX;
                    let diffX = currentX - startX;
                    if (diffX > 0) {
                        if (diffX > 80) diffX = 80;
                        element.style.transform = `translateX(${diffX}px)`;
                    }
                };

                const onMouseUp = (ev) => {
                    if (!isSwiping) return;
                    isSwiping = false;
                    let diffX = ev.clientX - startX;
                    element.style.transform = 'translateX(0px)';
                    if (diffX > 50) {
                        initiateReply(msgId, text);
                    }
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        function initiateReply(msgId, text) {
            if (chatInput.disabled) return;
            selectedReplyId = msgId;
            selectedReplyText = text;
            replyBannerText.textContent = `返信先: ${text}`;
            replyBanner.style.display = 'flex';
            inputBox.classList.add('has-reply');
            chatInput.focus();
        }

        function cancelReply() {
            selectedReplyId = null;
            selectedReplyText = '';
            replyBanner.style.display = 'none';
            inputBox.classList.remove('has-reply');
        }

        function deleteMessage(msgId) {
            if (!confirm("このメッセージをお互いの画面から完全に削除しますか？")) return;
            socket.emit('delete_message', { msgId: msgId, roomId: currentRoomId });
        }

        function appendMessageElement(data) {
            const msgGroup = document.createElement('div');
            msgGroup.classList.add('message-group');
            msgGroup.setAttribute('data-msg-id', data.id);
            
            let replyHtml = '';
            if (data.reply_text) {
                replyHtml = `<div class="msg-reply-preview">↳ ${escapeHTML(data.reply_text)}</div>`;
            }

            if (data.name === currentUser.username) {
                msgGroup.classList.add('sent');
                msgGroup.innerHTML = `
                    <div class="msg-avatar" style="background-color: var(--brand-color);">自分</div>
                    <div class="msg-body">
                        <div class="msg-header">
                            <span class="msg-name">あなた</span>
                            <span class="msg-time">${data.timestamp}</span>
                        </div>
                        ${replyHtml}
                        <div class="msg-text">${escapeHTML(data.text)}</div>
                        <div class="msg-actions">
                            <div class="reaction-badge" onclick="toggleReaction(this)">👏 <span>0</span></div>
                            <button class="btn-msg-del" onclick="deleteMessage(${data.id})"><i class="material-icons-outlined">delete</i></button>
                        </div>
                    </div>
                `;
            } else {
                msgGroup.classList.add('received');
                msgGroup.innerHTML = `
                    <div class="msg-avatar" style="background-color: ${data.color};">${data.avatar}</div>
                    <div class="msg-body">
                        <div class="msg-header">
                            <span class="msg-name">${data.name}</span>
                            <span class="msg-time">${data.timestamp}</span>
                        </div>
                        ${replyHtml}
                        <div class="msg-text">${escapeHTML(data.text)}</div>
                        <div class="msg-actions">
                            <div class="reaction-badge" onclick="toggleReaction(this)">👍 <span>0</span></div>
                            <button class="btn-msg-del" onclick="deleteMessage(${data.id})"><i class="material-icons-outlined">delete</i></button>
                        </div>
                    </div>
                `;
            }
            
            messageArea.appendChild(msgGroup);
            setupSwipeToReply(msgGroup, data.id, data.text);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        socket.on('load_history', (rows) => {
            messageArea.innerHTML = '';
            if (rows.length === 0) {
                const initialAvatar = currentChannelName.charAt(0).toUpperCase();
                messageArea.innerHTML = `
                    <div class="message-group received">
                        <div class="msg-avatar" style="background-color: ${currentChannelColor};">${initialAvatar}</div>
                        <div class="msg-body">
                            <div class="msg-header">
                                <span class="msg-name">${currentChannelName}</span>
                                <span class="msg-time">新しいスレッド</span>
                            </div>
                            <div class="msg-text">これは ${currentChannelName} とのトークスペースの最上部です。</div>
                        </div>
                    </div>
                `;
            } else {
                rows.forEach(row => {
                    appendMessageElement(row);
                });
            }
        });

        socket.on('receive_message', (msgData) => {
            if (msgData.channel === currentRoomId) {
                appendMessageElement(msgData);
            }
        });

        socket.on('message_deleted', (data) => {
            if (data.roomId === currentRoomId) {
                const el = document.querySelector(`.message-group[data-msg-id="${data.msgId}"]`);
                if (el) {
                    el.remove();
                    if (messageArea.children.length === 0) {
                        messageArea.innerHTML = `<div style="text-align:center; padding-top:40px; color:var(--text-sub);">メッセージがありません</div>`;
                    }
                }
            }
        });

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if(!text || !currentChannelName) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

            const msgData = {
                channel: currentRoomId,
                myId: currentUser.userId,
                friendId: isGroupMode ? '' : currentFriendId,
                isGroup: isGroupMode,
                name: currentUser.username,
                avatar: currentUser.username.charAt(0).toUpperCase(),
                color: '#0b57d0',
                text: text,
                timestamp: timeStr,
                replyId: selectedReplyId,
                replyText: selectedReplyText
            };

            socket.emit('send_message', msgData);

            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;
            cancelReply();
        });

        function switchChannel(element, name, avatarChar, color, idTarget, isGroup) {
            currentChannelName = name;
            currentChannelColor = color || '#74c0fc';
            isGroupMode = isGroup;
            cancelReply();
            
            if (isGroup) {
                currentFriendId = '';
                currentRoomId = idTarget;
                groupInviteArea.style.display = 'flex';
            } else {
                currentFriendId = idTarget;
                currentRoomId = [currentUser.userId, currentFriendId].sort().join('_');
                groupInviteArea.style.display = 'none';
            }
            
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('currentChatName').textContent = name;
            chatInput.placeholder = `${name} へのメッセージ`;
            chatInput.disabled = false;
            statusDot.style.display = 'block';
            
            socket.emit('join_channel', {
                myId: currentUser.userId,
                friendId: currentFriendId,
                isGroup: isGroupMode,
                groupId: currentRoomId
            });
        }

        function toggleReaction(element) {
            const countSpan = element.querySelector('span');
            let count = parseInt(countSpan.textContent);
            countSpan.textContent = count + 1;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        document.getElementById('toolEmoji').addEventListener('click', () => {
            if(chatInput.disabled) return;
            const emojis = ['😊', '👍', '🎉', '🚀', '✨'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            chatInput.value += randomEmoji;
            chatInput.dispatchEvent(new Event('input'));
            chatInput.focus();
        });

        loadFriends();
    </script>
</body>
</html>
